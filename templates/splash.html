<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday, Muddu! 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particles span {
            position: absolute;
            font-size: 22px;
            animation: floatUp 7s linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
            10%  { opacity: 0.9; }
            90%  { opacity: 0.9; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.3); opacity: 0; }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: zoomIn 1.2s ease-out;
        }
        @keyframes zoomIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Photo frame */
        .photo-frame {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            margin: 0 auto 30px;
            padding: 6px;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3, #48dbfb, #55efc4, #a29bfe);
            background-size: 300% 300%;
            animation: gradientBorder 4s ease infinite;
            box-shadow: 0 0 60px rgba(255, 107, 107, 0.4), 0 0 120px rgba(254, 202, 87, 0.2);
        }
        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 4px solid #1a1a2e;
        }

        /* Title */
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #ff9ff3, #48dbfb, #ff6b6b);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ccc;
            font-weight: 300;
            margin-bottom: 25px;
        }

        /* Countdown */
        .countdown {
            font-size: 0.95rem;
            color: #888;
            margin-top: 20px;
        }
        .countdown span {
            color: #feca57;
            font-weight: 600;
        }

        /* Sparkle burst */
        .sparkle {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Heart beat emoji */
        .heart-beat {
            font-size: 50px;
            display: inline-block;
            animation: heartbeat 1.2s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
        }

        @media (max-width: 500px) {
            .photo-frame { width: 220px; height: 220px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="card">
        <div class="heart-beat">🎂</div>
        <div class="photo-frame">
            <img src="{{ url_for('static', filename='muddu.jpg') }}" alt="Muddu">
        </div>
        <h1>Happy Birthday, Muddu!</h1>
        <p class="subtitle">🎉 Wishing you all the love & happiness in the world 🎉</p>
        <p class="countdown">Opening your surprise in <span id="timer">30</span> seconds... 💝</p>
    </div>

    <script>
        // Floating emojis
        const container = document.getElementById('particles');
        const emojis = ['🎂', '🎉', '🎈', '💖', '✨', '🌟', '💝', '🎁', '💕', '🥳', '🎊', '💗'];
        for (let i = 0; i < 40; i++) {
            const span = document.createElement('span');
            span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            span.style.left = Math.random() * 100 + '%';
            span.style.animationDelay = Math.random() * 7 + 's';
            span.style.fontSize = (16 + Math.random() * 20) + 'px';
            container.appendChild(span);
        }

        // Countdown timer
        let seconds = 30;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            timerEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "/card";
            }
        }, 1000);
    </script>

</body>
</html>
